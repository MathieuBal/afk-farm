<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#06070f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="AFK Farm — un idle de récolte magnétique : aimante des unités, construis une flotte cosmique, déploie un arbre de compétences infini et prestige." />
  <title>AFK Farm — Récolte magnétique</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="stage"></canvas>
  <canvas id="tree-canvas" style="display:none"></canvas>

  <!-- HUD -->
  <header id="hud">
    <div class="lumens">
      <span class="spark">✦</span>
      <span id="lumens-count">0</span>
      <span id="lumen-name" class="tier">Lumens</span>
    </div>
    <div class="sub">
      <span class="biome" id="biome-name">Ceinture d'astéroïdes</span>
      <span class="dot">·</span>
      <span class="rate">auto <span id="rate-count">0</span>/s</span>
      <span class="dot">·</span>
      <span class="cores">◆ <span id="cores-hud">0</span></span>
    </div>
  </header>
  <button id="profile-btn" aria-label="Profil">👤</button>

  <div id="hint"><b>Lance la récolte</b> puis balaie pour aimanter · <b>double-tap</b> = pôle</div>

  <!-- Tree header (overlay au-dessus du canvas d'arbre) -->
  <div id="tree-header" class="hidden">
    <div class="th-title">🌳 Arbre de compétences</div>
    <div class="th-lumens">✦ <span id="tree-lumens">0</span></div>
    <button id="tree-close" aria-label="Fermer">✕</button>
  </div>

  <!-- Bottom sheet (Chantier / Prestige) -->
  <section id="sheet">
    <div class="sheet-head">
      <h2 id="sheet-title">Chantier</h2>
      <button id="sheet-close" aria-label="Fermer">✕</button>
    </div>
    <div id="sheet-body"></div>
    <div class="sheet-foot"><button id="reset-btn">Réinitialiser la partie</button></div>
  </section>

  <!-- Harvest session (énergie / stockage / temps + lancement) -->
  <div id="harvest">
    <div class="gauges">
      <div class="g"><span class="g-ic">⚡</span><div class="bar"><i id="bar-energy"></i></div></div>
      <div class="g"><span class="g-ic">📦</span><div class="bar"><i id="bar-storage"></i></div></div>
      <div class="g"><span class="g-ic">⏱️</span><div class="bar"><i id="bar-timer"></i></div></div>
    </div>
    <div class="store-txt" id="store-txt">Prêt</div>
    <div class="harvest-row">
      <button id="harvest-btn">⚡ Lancer la récolte</button>
      <button id="surge-btn" aria-label="Surge">💥</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav id="nav">
    <button id="nav-field" class="active"><span class="ic">🧲</span><span class="lb">Récolte</span></button>
    <button id="nav-tree"><span class="ic">🌳</span><span class="lb">Arbre</span></button>
    <button id="nav-build"><span class="ic">🛠️</span><span class="lb">Chantier</span></button>
    <button id="nav-prestige"><span class="ic">🌌</span><span class="lb">Prestige</span></button>
  </nav>

  <div id="toasts"></div>

  <script src="js/state.js"></script>
  <script src="js/config.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/skilltree.js"></script>
  <script src="js/field.js"></script>
  <script src="js/game.js"></script>
  <script src="js/tree-ui.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
